name: Release (Windows)

# Builds the Windows Spell.exe bundle and uploads it to pegesund/spell_binaries
# as a release asset under tag v<VERSION>.
#
# Mac builds run locally via scripts/release-mac.sh (Xcode + Apple Developer ID
# cannot run in CI without burning notarization-API-key secrets).
#
# Trigger options:
#   1. Push a version tag:  git tag v0.1.0 && git push origin v0.1.0
#   2. Manual dispatch:     Actions → Release (Windows) → Run workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version, e.g. 0.1.0 (no leading "v"). Must match X.Y.Z.'
        required: true
        default: '0.1.0'
        type: string
  push:
    tags:
      - 'v*'

env:
  RELEASES_REPO: pegesund/spell_binaries
  ONNX_VERSION: '1.24.4'
  SWIPL_VERSION: '9.2.9'
  RUST_TOOLCHAIN: stable

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            echo "ERROR: no version provided and not a tag push" && exit 1
          fi
          # Accept proper semver: X.Y.Z plus optional -suffix (e.g. -test1, -rc.1, -alpha.2)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: version must be semver like 0.1.0 or 0.1.0-test1 (got: $VERSION)" && exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"   >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Checkout sibling source repos (private)
        # contexterGui's Cargo.toml has path deps to sibling repos:
        #   ../rustSpell/{mtag-rs, language-rs}
        #   ../contexter/nostos-cognio
        #   ../norwegian_piper            (Piper TTS G2P + ONNX inference)
        # On the runner, contexterGui sits at D:\a\contexterGui\contexterGui\,
        # so the deps resolve to D:\a\contexterGui\rustSpell\...,
        # D:\a\contexterGui\contexter\..., D:\a\contexterGui\norwegian_piper\...
        # — clone all three there.
        # RELEASES_REPO_TOKEN must have `repo` scope (not just public_repo)
        # since these source repos are private.
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          if (-not $env:GH_TOKEN) {
              Write-Error "RELEASES_REPO_TOKEN is empty — cannot clone private source repos"
              exit 1
          }
          $base = Split-Path -Parent $env:GITHUB_WORKSPACE
          # $base = D:\a\contexterGui
          Write-Host "Cloning sibling repos under $base"

          # Skip Git LFS smudge during clone. Two of the sibling repos
          # have LFS-tracked assets that the Spell binary build does NOT
          # touch:
          #   - contexter/training-data/minilm-onnx/*   (training data,
          #     not embedded at compile time)
          #   - norwegian_piper/data/de_DE-thorsten-medium.onnx  (German
          #     voice; Spell ships only Norwegian + English voices and
          #     they're downloaded at runtime from Cognio's S3, not
          #     bundled by the build)
          # Without this, every CI run consumes LFS bandwidth from
          # pegesund's account budget. v0.1.12's release run failed
          # with "This repository exceeded its LFS budget" and the
          # checkout aborted at training-data/minilm-onnx/.gitattributes
          # (which is itself an LFS pointer — chicken-and-egg). Setting
          # GIT_LFS_SKIP_SMUDGE makes git install pointer files in
          # place of the content; cargo build never reads those paths
          # so the bundle is unchanged.
          $env:GIT_LFS_SKIP_SMUDGE = "1"

          # Helper: clone-and-fail-loudly. The earlier version chained
          # three clones with no exit-code checks, so a single LFS
          # error would print noise but the step still continued —
          # we only noticed because $LASTEXITCODE happened to be 1
          # at the very end. Make each failure explicit instead.
          function Clone-Sibling($url, $dest) {
              git clone --depth 1 $url $dest
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "Failed to clone $url into $dest (exit $LASTEXITCODE)"
                  exit 1
              }
          }

          Clone-Sibling "https://x-access-token:$env:GH_TOKEN@github.com/pegesund/rustSpell.git" "$base\rustSpell"
          Clone-Sibling "https://x-access-token:$env:GH_TOKEN@github.com/pegesund/contexter.git" "$base\contexter"
          Clone-Sibling "https://x-access-token:$env:GH_TOKEN@github.com/pegesund/norwegian_piper.git" "$base\norwegian_piper"

          Write-Host "Sibling layout:"
          Get-ChildItem $base | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + target
        uses: Swatinem/rust-cache@v2
        # Don't fail the release when the post-step tries to save a cache key
        # that already exists. GitHub's cache backend returns 409 Conflict on
        # duplicate keys — Swatinem's post-action surfaces that as a step
        # failure, which marks the whole release red even though every build
        # artifact (Setup.exe, .nupkg, RELEASES) shipped fine. v0.1.6 hit this
        # because its commit only changed scripts/build-mac.sh — Cargo.lock
        # didn't change, so the cache key matched v0.1.5's already-saved entry.
        continue-on-error: true
        with:
          workspaces: ". -> target"
          key: spell-win-${{ hashFiles('**/Cargo.lock') }}

      - name: Install SWI-Prolog
        shell: pwsh
        run: |
          # Chocolatey's swi-prolog package is stale (stuck on ~8.4); download
          # the official Windows installer instead. Try the swi-prolog.org URL
          # first, fall back to GitHub mirror if upstream is slow/down.
          $version = "${{ env.SWIPL_VERSION }}"
          $file = "swipl-$version-1.x64.exe"
          $url1 = "https://www.swi-prolog.org/download/stable/bin/$file"
          $url2 = "https://github.com/SWI-Prolog/swipl-devel/releases/download/V$version/$file"

          $ok = $false
          foreach ($url in @($url1, $url2)) {
              Write-Host "Trying: $url"
              try {
                  Invoke-WebRequest -Uri $url -OutFile swipl-installer.exe -MaximumRedirection 5 -UseBasicParsing
                  if ((Get-Item swipl-installer.exe).Length -gt 1MB) {
                      Write-Host "Downloaded $((Get-Item swipl-installer.exe).Length) bytes"
                      $ok = $true
                      break
                  }
              } catch {
                  Write-Host "Failed: $_"
              }
          }
          if (-not $ok) { Write-Error "Could not download SWI-Prolog installer from any URL"; exit 1 }

          # NSIS-based installer; /S = silent. Default install path: C:\Program Files\swipl\
          Write-Host "Installing silently..."
          Start-Process -FilePath swipl-installer.exe -ArgumentList "/S" -Wait -NoNewWindow

          # Verify install
          if (-not (Test-Path "C:\Program Files\swipl\bin\libswipl.dll")) {
              Write-Error "SWI-Prolog install missing libswipl.dll at C:\Program Files\swipl\bin\"
              Write-Host "Contents of C:\Program Files\swipl\bin\:"
              Get-ChildItem "C:\Program Files\swipl\bin\" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
              exit 1
          }
          & "C:\Program Files\swipl\bin\swipl.exe" --version

      - name: Download ONNX Runtime
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v${{ env.ONNX_VERSION }}/onnxruntime-win-x64-${{ env.ONNX_VERSION }}.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile onnxruntime.zip -MaximumRedirection 5
          Expand-Archive -Path onnxruntime.zip -DestinationPath C:\onnxruntime
          if (-not (Test-Path "C:\onnxruntime\onnxruntime-win-x64-${{ env.ONNX_VERSION }}\lib\onnxruntime.dll")) {
              Write-Error "ONNX Runtime extraction failed"
              exit 1
          }

      - name: Cargo build (release)
        shell: pwsh
        run: |
          cargo build --release --bin acatts-rust --target x86_64-pc-windows-msvc
          # Also build the browser-companion native messaging host. The
          # desktop's src/native_host.rs auto-registration looks for
          # native_bridge.exe next to Spell.exe at startup; without this
          # CI step the installed app logs:
          #   Native host: registration failed: native_bridge.exe not found
          #   next to Spell.exe (browser-companion extension may not work
          #   until manually configured)
          # and the browser extension's chrome.runtime.connectNative call
          # silently fails (no host registered with Chrome).
          cargo build --release --bin native_bridge --target x86_64-pc-windows-msvc

      - name: Cargo build download diagnostic
        id: download_diag
        shell: pwsh
        run: |
          cargo build --release --bin test_download --target x86_64-pc-windows-msvc
          $diagDir = "dist\diagnostics"
          New-Item -Force -ItemType Directory -Path $diagDir | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\test_download.exe" "$diagDir\SpellDownloadDiagnostic.exe"
          echo "diag_dir=$diagDir" >> $env:GITHUB_OUTPUT

      - name: Assemble Spell-windows-x64 bundle dir
        id: bundle
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $bundleName = "Spell-windows-x64-$version"
          $bundleDir = "dist\$bundleName"

          # Layout (mirrors Mac .app for code-path consistency):
          #   Spell.exe
          #   Frameworks/  ← libswipl.dll, libgmp-10.dll, onnxruntime.dll
          #   Resources/
          #     swipl/     ← SWI-Prolog home (ABI, boot, library/, etc.)
          #     word-addin/
          #     fonts (OpenSans)
          New-Item -Force -ItemType Directory -Path "$bundleDir\Frameworks" | Out-Null
          New-Item -Force -ItemType Directory -Path "$bundleDir\Resources\swipl" | Out-Null
          New-Item -Force -ItemType Directory -Path "$bundleDir\Resources\word-addin" | Out-Null

          # Binary
          Copy-Item "target\x86_64-pc-windows-msvc\release\acatts-rust.exe" "$bundleDir\Spell.exe"

          # Browser-companion native messaging host. Must sit as a
          # sibling of Spell.exe so native_host::find_native_bridge_path
          # can locate it; the auto-registration writes the absolute
          # path into the per-browser HKCU registry keys at startup.
          Copy-Item "target\x86_64-pc-windows-msvc\release\native_bridge.exe" "$bundleDir\native_bridge.exe"
          if (-not (Test-Path "$bundleDir\native_bridge.exe")) {
              Write-Error "native_bridge.exe missing from bundle — browser companion extension won't work after install"
              exit 1
          }

          # SWI-Prolog DLLs into Frameworks/.
          # libswipl.dll's MinGW-w64 dep chain is: libgmp-10, libwinpthread-1,
          # libgcc_s_seh-1, libstdc++-6. The previous code globbed each name
          # with -ErrorAction SilentlyContinue, which silently skipped any
          # that didn't match — and at least one v0.1.x release shipped
          # without libstdc++-6.dll. End-user symptom: app launches fine but
          # every document shows "No errors found" because the grammar actor
          # panics at startup with Windows err 126 (ERROR_MOD_NOT_FOUND) when
          # LoadLibraryExW can't resolve the missing dep. Auto-update can't
          # rescue the user — they need a fresh installer.
          #
          # Two-part fix:
          #   1. Copy ALL .dll from swipl\bin (eliminates name-glob guesswork,
          #      ~30MB heavier — acceptable to never ship a broken bundle).
          #   2. Fall back to MSYS2's mingw64 bin for any missing required
          #      dep. github-hosted windows-latest runners have MSYS2
          #      preinstalled at C:\msys64\mingw64\bin\ — same MinGW-w64
          #      toolchain that built libswipl, so the runtime DLLs are
          #      ABI-compatible.
          #   3. Verify all 5 required deps are in Frameworks\ before vpk
          #      pack runs. Fail loudly if any are missing — never ship a
          #      bundle that will crash at startup.
          $swiplBin = "C:\Program Files\swipl\bin"
          Write-Host "SWI-Prolog bin DLLs:"
          Get-ChildItem "$swiplBin\*.dll" | ForEach-Object {
              Write-Host ("  {0,-40} {1:N0}" -f $_.Name, $_.Length)
          }
          Get-ChildItem "$swiplBin\*.dll" | ForEach-Object {
              Copy-Item $_.FullName "$bundleDir\Frameworks\"
          }

          # SWI 9.2.9's Windows installer ships libgmp + libgcc_s_seh +
          # libwinpthread but NOT libstdc++-6.dll, even though libswipl is
          # built with g++ and links against it. Fall back to other MinGW-w64
          # toolchains that exist on the runner. Order matters — the first
          # one found wins. Git for Windows is the most reliable source
          # (always preinstalled by GitHub Actions); MSYS2 + chocolatey
          # mingw are listed in case the runner image changes. As a last
          # resort, scan the filesystem (bounded to C:\, ~5s on a fresh
          # runner) so future image churn doesn't silently break us.
          $requiredDeps = @("libswipl.dll", "libgmp-10.dll",
                            "libwinpthread-1.dll", "libgcc_s_seh-1.dll",
                            "libstdc++-6.dll")
          $fallbackDirs = @(
              "C:\Program Files\Git\mingw64\bin",
              "C:\msys64\mingw64\bin",
              "C:\msys64\ucrt64\bin",
              "C:\mingw64\bin",
              "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"
          )
          foreach ($dep in $requiredDeps) {
              if (Test-Path "$bundleDir\Frameworks\$dep") { continue }

              $sourced = $false
              foreach ($dir in $fallbackDirs) {
                  $candidate = Join-Path $dir $dep
                  if (Test-Path $candidate) {
                      Write-Host "  $dep not in swipl\bin — sourcing from $dir"
                      Copy-Item $candidate "$bundleDir\Frameworks\"
                      $sourced = $true
                      break
                  }
              }

              if (-not $sourced) {
                  Write-Host "  $dep not in any known fallback dir — scanning C:\..."
                  $hit = Get-ChildItem -Path "C:\" -Filter $dep -Recurse `
                      -ErrorAction SilentlyContinue -Force |
                      Where-Object { $_.FullName -notlike "*\Windows\WinSxS\*" } |
                      Select-Object -First 1 -ExpandProperty FullName
                  if ($hit) {
                      Write-Host "  Found via filesystem scan: $hit"
                      Copy-Item $hit "$bundleDir\Frameworks\"
                  }
              }
          }

          $missing = @()
          foreach ($dep in $requiredDeps) {
              if (-not (Test-Path "$bundleDir\Frameworks\$dep")) {
                  $missing += $dep
              }
          }
          if ($missing.Count -gt 0) {
              Write-Host "Files actually in Frameworks\:"
              Get-ChildItem "$bundleDir\Frameworks\*.dll" | ForEach-Object {
                  Write-Host "  $($_.Name)"
              }
              Write-Error "Missing required SWI-Prolog deps in Frameworks\: $($missing -join ', ')"
              exit 1
          }
          Write-Host "All $($requiredDeps.Count) required SWI-Prolog deps verified in Frameworks\"

          # SWI-Prolog home: copy ABI, boot, boot.prc, library, app, customize, swipl.home
          # Skip bin/ (handled above), doc/, demo/, include/ (saves space)
          $swiplHome = "C:\Program Files\swipl"
          foreach ($item in @("ABI", "LICENSE", "README.md", "boot", "boot.prc", "library", "app", "customize", "swipl.home")) {
              if (Test-Path "$swiplHome\$item") {
                  Copy-Item -Recurse "$swiplHome\$item" "$bundleDir\Resources\swipl\"
              }
          }

          # Verify the runtime bootstrap file is present. The Rust loader
          # uses boot.prc as its marker for "this is a valid SWI home"
          # (nostos-cognio swipl_checker.rs); without it SWI panics at
          # PL_initialise with "Could not find system resources" and the
          # grammar actor dies, leaving every document showing
          # "No errors found" for end users. Fail the build before we
          # ship a release that crashes at startup.
          $swiplRequired = @("boot.prc", "library", "boot")
          $swiplMissing = @()
          foreach ($item in $swiplRequired) {
              if (-not (Test-Path "$bundleDir\Resources\swipl\$item")) {
                  $swiplMissing += $item
              }
          }
          if ($swiplMissing.Count -gt 0) {
              Write-Host "Files actually in Resources\swipl\:"
              Get-ChildItem "$bundleDir\Resources\swipl" | ForEach-Object {
                  Write-Host "  $($_.Name)"
              }
              Write-Error "Missing required SWI-Prolog home files in Resources\swipl\: $($swiplMissing -join ', ')"
              exit 1
          }
          Write-Host "SWI-Prolog home verified: boot.prc + library/ + boot/ all present"

          # ONNX Runtime
          Copy-Item "C:\onnxruntime\onnxruntime-win-x64-${{ env.ONNX_VERSION }}\lib\onnxruntime.dll" "$bundleDir\Frameworks\"

          # Fonts
          Copy-Item "fonts\OpenSans-Regular.ttf" "$bundleDir\Resources\"

          # Word add-in static files (key.pem deliberately NOT bundled — see SECURITY note in build-mac.sh)
          foreach ($f in @("manifest.xml", "taskpane.html", "taskpane.js", "commands.html", "commands.js", "fullchain.pem")) {
              if (Test-Path "word-addin\$f") {
                  Copy-Item "word-addin\$f" "$bundleDir\Resources\word-addin\"
              }
          }

          $size = (Get-ChildItem $bundleDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host ("Bundle size: {0:N1} MB" -f $size)
          echo "bundle_dir=$bundleDir"     >> $env:GITHUB_OUTPUT
          echo "bundle_name=$bundleName"   >> $env:GITHUB_OUTPUT

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          # vpk is the Velopack CLI; matches what ConcentrateDotNet uses for its
          # Windows installer + auto-update infrastructure.
          dotnet tool install -g vpk
          # vpk has no global --version flag; use --help to confirm it runs.
          # The first line of --help shows "Velopack vX.Y.Z" so we surface that.
          vpk --help | Select-Object -First 3

      - name: Velopack pack (Setup.exe + delta updates)
        id: vpk
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $bundleDir = "${{ steps.bundle.outputs.bundle_dir }}"
          $outputDir = "dist\releases\win"
          New-Item -Force -ItemType Directory -Path $outputDir | Out-Null

          vpk pack `
              --packId Spell `
              --packVersion $version `
              --packDir $bundleDir `
              --mainExe "Spell.exe" `
              --icon "assets\Spell.ico" `
              --packTitle "Spell" `
              --packAuthors "Cognio AS" `
              --outputDir $outputDir
          if ($LASTEXITCODE -ne 0) { Write-Error "vpk pack failed"; exit 1 }

          Write-Host "Output files:"
          Get-ChildItem $outputDir | ForEach-Object {
              $sz = "{0:N1} MB" -f ($_.Length / 1MB)
              Write-Host "  $($_.Name) ($sz)"
          }
          echo "output_dir=$outputDir" >> $env:GITHUB_OUTPUT

      - name: Upload Velopack outputs to spell_binaries release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $version = "${{ steps.ver.outputs.version }}"
          $outputDir = "${{ steps.vpk.outputs.output_dir }}"

          # Create release if it doesn't exist (Mac script may have already created it).
          gh release view $tag --repo ${{ env.RELEASES_REPO }} 2>$null
          if ($LASTEXITCODE -ne 0) {
              Write-Host "Creating new release $tag"
              gh release create $tag `
                  --repo ${{ env.RELEASES_REPO }} `
                  --title "Spell $version" `
                  --notes "Auto-generated. Mac DMG uploaded by release-mac.sh; Windows Setup.exe + delta updates by release-windows.yml CI."
          } else {
              Write-Host "Release $tag already exists — uploading assets to it."
          }

          # Upload all Velopack outputs:
          #   Spell-Setup.exe       — installer with auto-update support
          #   Spell-X.Y.Z-full.nupkg — full package (used for delta basis)
          #   Spell-X.Y.Z-delta.nupkg — delta from previous version (if any)
          #   RELEASES              — version manifest (auto-update reads this)
          Get-ChildItem $outputDir | ForEach-Object {
              Write-Host "Uploading $($_.Name)"
              gh release upload $tag $_.FullName --repo ${{ env.RELEASES_REPO }} --clobber
          }

          $diagExe = Join-Path "${{ steps.download_diag.outputs.diag_dir }}" "SpellDownloadDiagnostic.exe"
          if (Test-Path $diagExe) {
              Write-Host "Uploading SpellDownloadDiagnostic.exe"
              gh release upload $tag $diagExe --repo ${{ env.RELEASES_REPO }} --clobber
          } else {
              Write-Host "SpellDownloadDiagnostic.exe not found at $diagExe — skipping release upload"
          }
          Write-Host "https://github.com/${{ env.RELEASES_REPO }}/releases/tag/$tag"

      - name: Upload bundle artifact (CI debugging)
        if: always() && steps.vpk.outputs.output_dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle.outputs.bundle_name }}-velopack
          path: ${{ steps.vpk.outputs.output_dir }}
          retention-days: 7

      - name: Upload download diagnostic artifact
        if: always() && steps.download_diag.outputs.diag_dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: Spell-download-diagnostic-windows-x64
          path: ${{ steps.download_diag.outputs.diag_dir }}\SpellDownloadDiagnostic.exe
          retention-days: 14
